<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>간단한 입력 폼</title>
</head>
<body>
    <h2>데이터 입력</h2>
    <form action="/submit" method="post">
        <div>
            <label>이름:</label>
            <input type="text" name="name" required>
        </div><br>
        <div>
            <label>나이:</label>
            <input type="number" name="age" required>
        </div><br>
        <button type="submit">전송</button>
    </form>
</body>
</html>
